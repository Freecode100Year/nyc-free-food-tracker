<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Free Food Tracker - Redirect</title>
    <meta http-equiv="refresh" content="0; url=cloudflare-pages/">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            padding: 10px 20px;
            border: 2px solid white;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .links a:hover {
            background: white;
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NYC Free Food Tracker</h1>
        <p>正在重定向到应用...</p>
        <div class="spinner"></div>
        
        <div class="links">
            <p>如果重定向失败，请点击：</p>
            <a href="cloudflare-pages/">打开应用</a>
            <a href="https://github.com/9292008133/nyc-free-food-tracker">查看代码</a>
        </div>
        
        <p style="margin-top: 30px; font-size: 0.9em; opacity: 0.8;">
            由 🤖 肖勤立bot 创建 • 为 肖勤立 服务
        </p>
    </div>
    
    <script>
        // 如果5秒后还在这个页面，显示手动链接
        setTimeout(function() {
            document.querySelector('.links').style.display = 'block';
        }, 5000);
    </script>
</body>
</html>
